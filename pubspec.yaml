name: webnovel_translator
description: Translate webnovels chapter-by-chapter with auto-fetch and per-novel context.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local database (structured for easy cloud-sync later)
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking / scraping
  http: ^1.2.1
  html: ^0.15.4
  webview_flutter: ^4.7.0

  # Utilities
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.6
  flutter_html: ^3.0.0-beta.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.16.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
